name: Deploy Django (SSH)

on:
  push:
    branches: [ "main" ]

concurrency:
  group: deploy-django
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.APP_DIR }}"
            git fetch --all
            git reset --hard origin/main

            # Nếu bạn dùng venv cố định trên server, chỉnh lại đường dẫn cho đúng
            if [ -f "venv/bin/activate" ]; then
              . venv/bin/activate
            else
              python3 -m venv venv
              . venv/bin/activate
            fi

            pip install -U pip
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            # Django migrate + collectstatic (tuỳ dự án có dùng)
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput || true

            # Restart service (chọn 1 trong các dòng dưới và chỉnh service name)
            sudo systemctl restart gunicorn || true
            sudo systemctl restart nginx || true
